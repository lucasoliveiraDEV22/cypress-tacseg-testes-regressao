trigger: none
pr: none

pool:
  vmImage: 'ubuntu-22.04'

# timeoutInMinutes: 30

variables:
  - group: TacSeg-Variaveis

  - name: npm_config_cache
    value: $(Pipeline.Workspace)/.npm

  - name: CYPRESS_CACHE_FOLDER
    value: $(Pipeline.Workspace)/.cache/Cypress

steps:
  - task: NodeTool@0
    displayName: 'Instalar Node.js'
    inputs:
      versionSpec: '20.x'

  - task: Cache@2
    displayName: 'Cache npm'
    inputs:
      key: 'npm | "$(Agent.OS)" | package-lock.json'
      restoreKeys: |
        npm | "$(Agent.OS)"
      path: $(npm_config_cache)

  - task: Cache@2
    displayName: 'Cache binário do Cypress'
    inputs:
      key: 'cypress | "$(Agent.OS)" | package-lock.json'
      restoreKeys: |
        cypress | "$(Agent.OS)"
      path: $(CYPRESS_CACHE_FOLDER)

  - script: npm ci --cache $(npm_config_cache) --prefer-offline
    displayName: 'Instalar dependências'

  - script: npx cypress verify
    displayName: 'Verificar Cypress'

  - script: mkdir -p cypress/results
    displayName: 'Preparar pasta de relatórios JUnit'

  - script: |
      npx cypress run \
        --spec cypress/e2e/testes.cy.js \
        --browser chrome \
        --headless \
        --reporter cypress-multi-reporters \
        --reporter-options configFile=reporter-config.json
    displayName: 'Executar testes E2E (Chrome)'
    env:
      CYPRESS_name: $(CYPRESS_name)
      CYPRESS_email: $(CYPRESS_email)
      CYPRESS_WHATSAPP_PHONE: $(CYPRESS_WHATSAPP_PHONE)
      CYPRESS_SIGNUPPASSWORD: $(CYPRESS_SIGNUPPASSWORD)
     

  - task: PublishTestResults@2
    displayName: 'Publicar resultados JUnit'
    condition: always()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: 'cypress/results/*.xml'
      mergeTestResults: true
      testRunTitle: 'Cypress - testes.cy.js'